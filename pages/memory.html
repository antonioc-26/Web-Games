<!--
===============================================================================
Author: Antonio Corona
Date: 2026-03-14
Project: Web Games Collection
Game: Memory Match
File: memory.html

Description:
This page implements the Memory Match Game interface. The player flips cards
to find matching pairs while tracking time and move count.

Dependencies:
- ../assets/css/style.css  -> Global styling for the game layout
- ../assets/js/memory.js   -> Game logic and card interaction handling

Notes:
- The game board is dynamically generated by memory.js.
- Timer and move counter are updated in real time during gameplay.
===============================================================================
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding for proper text rendering -->
    <meta charset="UTF-8" />

    <!-- Page title displayed in the browser tab -->
    <title>Memory Match Game</title>

    <!-- Shared stylesheet for layout and styling -->
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>

  <body>
    <!-- Page header -->
    <h1>Memory Game</h1>

    <!-- Main container for the game interface -->
    <div class="game-container">
      
      <!-- Displays elapsed game time (updated via JavaScript) -->
      <p>Time: <span id="timer">0</span> seconds</p>

      <!-- Displays the number of player moves -->
      <p>Moves: <span id="moves">0</span></p>

      <!-- 
        Game board container.
        Cards are dynamically created and inserted here by memory.js.
      -->
      <div class="game-board" id="gameBoard"></div>

    </div>

    <!-- Navigation button to return to the main games menu -->
    <button onclick="location.href='../index.html'">Home Page</button>

    <!-- 
      JavaScript file containing the game logic:
      - Card generation
      - Flip mechanics
      - Match detection
      - Timer and move tracking
    -->
    <script src="../assets/js/memory.js"></script>
  </body>
</html>
