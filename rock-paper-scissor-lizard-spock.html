<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Lizard Spock</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="spock">
      <div class="container">
        <h1>Rock Paper Scissor Lizard Spock</h1>

        <div class="choices">
          <img
            src="images/rock.jpg"
            data-choice="Rock"
            alt="Rock"
            class="choice-button"
          />
          <img
            src="images/paper.jpg"
            data-choice="Paper"
            alt="Paper"
            class="choice-button"
          />
          <img
            src="images/scissors.jpg"
            data-choice="Scissors"
            alt="Scissors"
            class="choice-button"
          />
          <img
            src="images/lizard.webp"
            data-choice="Lizard"
            alt="Lizard"
            class="choice-button"
          />
          <img
            src="images/spock.jpeg"
            data-choice="Spock"
            alt="Spock"
            class="choice-button"
          />
        </div>

        <div class="results">
          <div class="scoreboard">
            <div class="scoreboard_container">
              <div class="column">
                <h3>PLAYER</h3>
                <h2 id="playerScore" class="scoreboard_score">0</h2>
              </div>
              <div class="column">
                <h3>COMPUTER</h3>
                <h2 id="computerScore" class="scoreboard_score">0</h2>
              </div>
            </div>
          </div>

          <p id="round-result">Make your choice!</p>
          <!-- <p id="scoreboard">Player: 0 | Computer: 0</p> -->
        </div>

        <button id="reset">Reset Score</button>
      </div>
    </div>

    <button onclick="location.href='index.html'">Home Page</button>

    <script src="rock-paper-scissor-lizard-spock.js" defer></script>
  </body>
</html>
